<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة التحكم</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1rem;
        }
        
        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 420px;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo i {
            font-size: 4rem;
            color: #6366f1;
            margin-bottom: 1rem;
        }
        
        .login-logo h1 {
            font-size: 1.75rem;
            color: #111827;
            margin-bottom: 0.5rem;
        }
        
        .login-logo p {
            color: #6b7280;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
        }
        
        .input-icon {
            position: relative;
        }
        
        .input-icon i {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .input-icon input {
            padding-right: 2.75rem;
        }
        
        .forgot-password {
            text-align: left;
            margin-top: -0.5rem;
        }
        
        .forgot-password a {
            color: #6366f1;
            font-size: 0.875rem;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e5e7eb;
        }
        
        .login-footer a {
            color: #6366f1;
            font-weight: 600;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    
    <div class="login-container">
        <div class="login-logo">
            <i class="fas fa-shield-alt"></i>
            <h1>لوحة التحكم</h1>
            <p>سجّل دخولك للوصول إلى لوحة الإدارة</p>
        </div>
        
        <div class="error-message" id="error-message"></div>
        
        <form class="login-form" id="login-form">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" required placeholder="admin@example.com">
                </div>
            </div>
            
            <div class="form-group">
                <label>كلمة المرور</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
            </div>
            
            <div class="forgot-password">
                <a href="#" id="forgot-password-link">نسيت كلمة المرور؟</a>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
                <i class="fas fa-sign-in-alt"></i>
                تسجيل الدخول
            </button>
        </form>
        
        <div class="login-footer">
            <a href="index.html">
                <i class="fas fa-arrow-right"></i>
                العودة للموقع
            </a>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <script src="js/config.js"></script>
    
    <script>
        // التحقق من تسجيل الدخول المسبق
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.href = 'admin.html';
            }
        });
        
        // معالجة تسجيل الدخول
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');
            const errorMessage = document.getElementById('error-message');
            
            // إخفاء رسالة الخطأ
            errorMessage.classList.remove('show');
            
            // تعطيل الزر
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تسجيل الدخول...';
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                window.location.href = 'admin.html';
            } catch (error) {
                console.error('Login error:', error);
                
                let message = 'حدث خطأ أثناء تسجيل الدخول';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        message = 'البريد الإلكتروني غير مسجل';
                        break;
                    case 'auth/wrong-password':
                        message = 'كلمة المرور غير صحيحة';
                        break;
                    case 'auth/invalid-email':
                        message = 'البريد الإلكتروني غير صالح';
                        break;
                    case 'auth/too-many-requests':
                        message = 'تم تجاوز عدد المحاولات. يرجى المحاولة لاحقاً';
                        break;
                }
                
                errorMessage.textContent = message;
                errorMessage.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
            }
        });
        
        // نسيت كلمة المرور
        document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            if (!email) {
                alert('يرجى إدخال البريد الإلكتروني أولاً');
                return;
            }
            
            try {
                await auth.sendPasswordResetEmail(email);
                alert('تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني');
            } catch (error) {
                console.error('Reset password error:', error);
                alert('حدث خطأ أثناء إرسال الرابط');
            }
        });
    </script>
</body>
</html>
